<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <h1>TO-DO LIST</h1>
        <div class="input-container">
            <input type="text" id="task-input" placeholder="Add a new task..." onkeypress="addTaskOnEnter(event)">
            <button id="add-task-btn" onclick="addTask()">Add</button>
            <button id="clear-tasks-btn" onclick="clearTasks()">Clear All</button>
        </div>
        <ul id="task-list">

        </ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
